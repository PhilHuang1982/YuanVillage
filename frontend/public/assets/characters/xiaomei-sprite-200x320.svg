<svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" aria-label="小梅 立绘">
  <defs>
    <linearGradient id="xm-shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eed8"/>
      <stop offset="100%" stop-color="#dec8a0"/>
    </linearGradient>
    <linearGradient id="xm-apron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#84a17a"/>
      <stop offset="100%" stop-color="#4f7259"/>
    </linearGradient>
    <linearGradient id="xm-pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4c30"/>
      <stop offset="100%" stop-color="#3a2812"/>
    </linearGradient>
    <linearGradient id="xm-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6dec1"/>
      <stop offset="100%" stop-color="#e6c099"/>
    </linearGradient>
    <radialGradient id="xm-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e89a7a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#e89a7a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 脚影 -->
  <ellipse cx="100" cy="305" rx="40" ry="34" fill="#3a2f25" opacity="0.22" style="filter:blur(2px)"/>

  <!-- 裤腿 -->
  <path d="M 70 220 Q 70 270 75 295 L 95 295 Q 95 260 96 220 Z" fill="url(#xm-pants)" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 104 220 Q 105 260 105 295 L 125 295 Q 130 270 130 220 Z" fill="url(#xm-pants)" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>
  <ellipse cx="85" cy="297" rx="14" ry="6" fill="#3a2812" stroke="#1b1612" stroke-width="2"/>
  <ellipse cx="115" cy="297" rx="14" ry="6" fill="#3a2812" stroke="#1b1612" stroke-width="2"/>

  <!-- 围裙 -->
  <path d="M 62 185 Q 60 215 68 235 L 132 235 Q 140 215 138 185 Z" fill="url(#xm-apron)" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 62 185 L 138 185" stroke="#1b1612" stroke-width="1.5" opacity=".4"/>
  <path d="M 62 188 Q 50 195 48 200" stroke="#1b1612" stroke-width="1.5" fill="none"/>
  <path d="M 138 188 Q 150 195 152 200" stroke="#1b1612" stroke-width="1.5" fill="none"/>

  <!-- 衣身+袖子 -->
  <path d="M 56 165 L 56 210 L 144 210 L 144 165 Q 130 145 100 145 Q 70 145 56 165 Z" fill="url(#xm-shirt)" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 56 165 Q 42 175 38 200 Q 48 205 58 200 Z" fill="url(#xm-shirt)" stroke="#1b1612" stroke-width="2.5"/>
  <path d="M 144 165 Q 158 175 162 200 Q 152 205 142 200 Z" fill="url(#xm-shirt)" stroke="#1b1612" stroke-width="2.5"/>
  <circle cx="46" cy="208" r="7" fill="url(#xm-skin)" stroke="#1b1612" stroke-width="2"/>
  <circle cx="154" cy="208" r="7" fill="url(#xm-skin)" stroke="#1b1612" stroke-width="2"/>

  <!-- 花枝 -->
  <g transform="translate(150 165)">
    <path d="M 0 45 Q -5 30 -10 10 Q -8 -2 -3 -10" stroke="#4f7259" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-3" cy="-10" r="6" fill="#f0b48a" stroke="#1b1612" stroke-width="1.5"/>
    <circle cx="-10" cy="2" r="5" fill="#e89a7a" stroke="#1b1612" stroke-width="1.5"/>
    <circle cx="-7" cy="22" r="4" fill="#f0b48a" stroke="#1b1612" stroke-width="1.5"/>
    <path d="M -12 15 Q -16 12 -18 18" stroke="#4f7259" stroke-width="1.5" fill="none"/>
    <path d="M -5 5 Q -1 -2 4 0" stroke="#4f7259" stroke-width="1.5" fill="none"/>
  </g>

  <!-- 领口+脖子 -->
  <path d="M 86 140 Q 100 158 114 140 L 114 165 L 86 165 Z" fill="url(#xm-skin)" stroke="#1b1612" stroke-width="2.5"/>
  <rect x="92" y="125" width="16" height="18" fill="url(#xm-skin)" stroke="#1b1612" stroke-width="2"/>

  <!-- 头部后发 -->
  <path d="M 58 100 Q 53 60 76 42 Q 100 28 124 42 Q 147 60 142 100 L 142 130 Q 138 115 130 110 L 70 110 Q 62 115 58 130 Z" fill="#2a2018" stroke="#1b1612" stroke-width="2.5"/>

  <!-- 脸 -->
  <ellipse cx="100" cy="92" rx="32" ry="38" fill="url(#xm-skin)" stroke="#1b1612" stroke-width="2.5"/>
  <ellipse cx="68" cy="92" rx="5" ry="8" fill="url(#xm-skin)" stroke="#1b1612" stroke-width="2"/>
  <ellipse cx="132" cy="92" rx="5" ry="8" fill="url(#xm-skin)" stroke="#1b1612" stroke-width="2"/>

  <!-- 刘海 -->
  <path d="M 75 70 Q 85 60 100 62 Q 115 60 125 70 L 125 95 Q 115 80 100 80 Q 85 80 75 95 Z" fill="#2a2018" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 80 65 L 85 80 M 95 60 L 95 78 M 110 62 L 112 78" stroke="#1b1612" stroke-width="1.5" opacity=".6"/>

  <!-- 后发束 -->
  <path d="M 138 102 Q 158 108 162 130 Q 160 145 152 148 Q 145 140 142 125 Z" fill="#2a2018" stroke="#1b1612" stroke-width="2.5"/>

  <!-- 眉 -->
  <path d="M 78 84 L 92 83" stroke="#1b1612" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 108 83 L 122 84" stroke="#1b1612" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 眼 -->
  <path d="M 78 94 Q 85 91 92 94 Q 85 97 78 94 Z" fill="#1b1612" stroke="#1b1612" stroke-width="2"/>
  <path d="M 108 94 Q 115 91 122 94 Q 115 97 108 94 Z" fill="#1b1612" stroke="#1b1612" stroke-width="2"/>
  <circle cx="84" cy="93" r="1" fill="#fff" opacity=".8"/>
  <circle cx="114" cy="93" r="1" fill="#fff" opacity=".8"/>

  <!-- 腮红 -->
  <ellipse cx="80" cy="106" rx="6" ry="3" fill="url(#xm-cheek)"/>
  <ellipse cx="120" cy="106" rx="6" ry="3" fill="url(#xm-cheek)"/>

  <!-- 鼻 -->
  <path d="M 100 98 L 99 108" stroke="#3a2f25" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 嘴 -->
  <path d="M 95 115 Q 100 117 105 115" stroke="#a4502f" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
