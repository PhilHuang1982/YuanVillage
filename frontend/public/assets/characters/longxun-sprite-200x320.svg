<svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" aria-label="龙圣子 立绘">
  <defs>
    <linearGradient id="lx-robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a6f5b"/>
      <stop offset="60%" stop-color="#3f5341"/>
      <stop offset="100%" stop-color="#2d3e30"/>
    </linearGradient>
    <linearGradient id="lx-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1e6cf"/>
      <stop offset="100%" stop-color="#dac9a4"/>
    </linearGradient>
    <linearGradient id="lx-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4dbb8"/>
      <stop offset="100%" stop-color="#e1bd91"/>
    </linearGradient>
    <radialGradient id="lx-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e89a7a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#e89a7a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 脚影 -->
  <ellipse cx="100" cy="305" rx="42" ry="35.7" fill="#3a2f25" opacity="0.22" style="filter:blur(2px)"/>

  <!-- 长褂 -->
  <path d="M 50 180 Q 48 230 40 290 L 160 290 Q 152 230 150 180 Z" fill="url(#lx-robe)" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 100 180 Q 95 235 92 290" stroke="#1b1612" stroke-width="1.5" fill="none" opacity=".7"/>
  <rect x="48" y="200" width="104" height="10" fill="#a4502f" stroke="#1b1612" stroke-width="1.5"/>
  <circle cx="100" cy="205" r="3" fill="#f5ecd7" stroke="#1b1612" stroke-width="1"/>

  <!-- 袖口 -->
  <path d="M 56 178 Q 50 200 58 218 Q 72 210 75 195 Z" fill="url(#lx-robe)" stroke="#1b1612" stroke-width="2"/>
  <path d="M 144 178 Q 150 200 142 218 Q 128 210 125 195 Z" fill="url(#lx-robe)" stroke="#1b1612" stroke-width="2"/>

  <!-- 内衬领口 -->
  <path d="M 78 145 Q 100 168 122 145 L 122 175 L 78 175 Z" fill="url(#lx-inner)" stroke="#1b1612" stroke-width="2" stroke-linejoin="round"/>
  <path d="M 60 150 L 78 145 L 100 175 L 122 145 L 140 150 L 138 185 L 62 185 Z" fill="url(#lx-robe)" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 脖子 -->
  <rect x="90" y="130" width="20" height="20" fill="url(#lx-skin)" stroke="#1b1612" stroke-width="2"/>

  <!-- 头部后发 -->
  <path d="M 55 90 Q 50 60 70 45 Q 100 30 130 45 Q 150 60 145 95 L 145 120 Q 140 110 130 108 Q 125 105 122 100 L 78 100 Q 75 105 70 108 Q 60 110 55 120 Z" fill="#8a8576" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 68 60 Q 80 50 95 52" stroke="#f5ecd7" stroke-width="2" fill="none" opacity=".6" stroke-linecap="round"/>

  <!-- 脸 -->
  <ellipse cx="100" cy="95" rx="32" ry="38" fill="url(#lx-skin)" stroke="#1b1612" stroke-width="2.5"/>
  <ellipse cx="68" cy="95" rx="5" ry="8" fill="url(#lx-skin)" stroke="#1b1612" stroke-width="2"/>
  <ellipse cx="132" cy="95" rx="5" ry="8" fill="url(#lx-skin)" stroke="#1b1612" stroke-width="2"/>

  <!-- 发髻 -->
  <ellipse cx="100" cy="42" rx="12" ry="10" fill="#6b6356" stroke="#1b1612" stroke-width="2"/>
  <path d="M 88 40 Q 100 30 112 40" stroke="#1b1612" stroke-width="1.5" fill="none"/>

  <!-- 眉 -->
  <path d="M 78 84 Q 85 80 92 84" stroke="#3a2f25" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 108 84 Q 115 80 122 84" stroke="#3a2f25" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 眼 -->
  <path d="M 80 95 Q 86 99 92 95" stroke="#1b1612" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 108 95 Q 114 99 120 95" stroke="#1b1612" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="80" cy="108" rx="7" ry="4" fill="url(#lx-cheek)"/>
  <ellipse cx="120" cy="108" rx="7" ry="4" fill="url(#lx-cheek)"/>

  <!-- 鼻 -->
  <path d="M 100 100 L 99 110" stroke="#3a2f25" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 嘴 -->
  <path d="M 94 117 Q 100 121 106 117" stroke="#3a2f25" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 短须 -->
  <path d="M 92 122 Q 90 130 88 134" stroke="#6b6356" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 108 122 Q 110 130 112 134" stroke="#6b6356" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 122 Q 98 132 96 138" stroke="#6b6356" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 122 Q 102 132 104 138" stroke="#6b6356" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 竹简 -->
  <g transform="translate(40 195) rotate(-10)">
    <rect x="0" y="0" width="6" height="34" fill="#c9a784" stroke="#1b1612" stroke-width="1.5"/>
    <rect x="6" y="0" width="6" height="34" fill="#b08c63" stroke="#1b1612" stroke-width="1.5"/>
    <rect x="12" y="0" width="6" height="34" fill="#9b7651" stroke="#1b1612" stroke-width="1.5"/>
    <line x1="-1" y1="6" x2="19" y2="6" stroke="#a4502f" stroke-width="1.5"/>
    <line x1="-1" y1="28" x2="19" y2="28" stroke="#a4502f" stroke-width="1.5"/>
  </g>
</svg>
