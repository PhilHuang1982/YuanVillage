<svg viewBox="40 20 120 150" xmlns="http://www.w3.org/2000/svg" aria-label="小梅 头像">
  <defs>
    <linearGradient id="xmp-shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eed8"/>
      <stop offset="100%" stop-color="#dec8a0"/>
    </linearGradient>
    <linearGradient id="xmp-apron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#84a17a"/>
      <stop offset="100%" stop-color="#4f7259"/>
    </linearGradient>
    <linearGradient id="xmp-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6dec1"/>
      <stop offset="100%" stop-color="#e6c099"/>
    </linearGradient>
    <radialGradient id="xmp-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e89a7a" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#e89a7a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 围裙边缘 -->
  <path d="M 60 175 L 140 175 L 140 175 Q 100 200 60 175 Z" fill="url(#xmp-apron)" stroke="#1b1612" stroke-width="2.5"/>
  <path d="M 52 155 L 52 175 L 148 175 L 148 155 Q 130 138 100 138 Q 70 138 52 155 Z" fill="url(#xmp-shirt)" stroke="#1b1612" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 领口 -->
  <path d="M 84 138 Q 100 156 116 138 L 116 162 L 84 162 Z" fill="url(#xmp-skin)" stroke="#1b1612" stroke-width="2.5"/>
  <rect x="91" y="120" width="18" height="20" fill="url(#xmp-skin)" stroke="#1b1612" stroke-width="2"/>

  <!-- 后发 -->
  <path d="M 56 95 Q 50 55 76 38 Q 100 24 124 38 Q 150 55 144 95 L 144 130 Q 138 115 130 108 L 70 108 Q 62 115 56 130 Z" fill="#2a2018" stroke="#1b1612" stroke-width="2.5"/>

  <!-- 脸 -->
  <ellipse cx="100" cy="88" rx="34" ry="40" fill="url(#xmp-skin)" stroke="#1b1612" stroke-width="2.5"/>
  <ellipse cx="66" cy="90" rx="6" ry="9" fill="url(#xmp-skin)" stroke="#1b1612" stroke-width="2"/>
  <ellipse cx="134" cy="90" rx="6" ry="9" fill="url(#xmp-skin)" stroke="#1b1612" stroke-width="2"/>

  <!-- 刘海 -->
  <path d="M 72 64 Q 84 52 100 55 Q 116 52 128 64 L 128 92 Q 116 75 100 75 Q 84 75 72 92 Z" fill="#2a2018" stroke="#1b1612" stroke-width="2.5"/>
  <path d="M 78 60 L 84 78 M 95 54 L 95 76 M 110 56 L 112 76 M 121 60 L 119 78" stroke="#1b1612" stroke-width="1.4" opacity=".55"/>

  <!-- 后发束 -->
  <path d="M 140 100 Q 162 108 166 130 Q 164 148 154 152 Q 146 142 142 128 Z" fill="#2a2018" stroke="#1b1612" stroke-width="2.5"/>

  <!-- 眉 -->
  <path d="M 76 80 L 93 79" stroke="#1b1612" stroke-width="3" stroke-linecap="round"/>
  <path d="M 107 79 L 124 80" stroke="#1b1612" stroke-width="3" stroke-linecap="round"/>

  <!-- 眼 -->
  <path d="M 76 92 Q 85 88 94 92 Q 85 96 76 92 Z" fill="#1b1612" stroke="#1b1612" stroke-width="2.4"/>
  <path d="M 106 92 Q 115 88 124 92 Q 115 96 106 92 Z" fill="#1b1612" stroke="#1b1612" stroke-width="2.4"/>
  <circle cx="84" cy="91" r="1.4" fill="#fff" opacity=".9"/>
  <circle cx="114" cy="91" r="1.4" fill="#fff" opacity=".9"/>

  <!-- 腮红 -->
  <ellipse cx="78" cy="103" rx="7" ry="4" fill="url(#xmp-cheek)"/>
  <ellipse cx="122" cy="103" rx="7" ry="4" fill="url(#xmp-cheek)"/>

  <!-- 鼻 -->
  <path d="M 100 97 L 99 108" stroke="#3a2f25" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- 嘴 -->
  <path d="M 94 116 Q 100 119 106 116" stroke="#a4502f" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- 耳后小花 -->
  <g transform="translate(60 70)">
    <circle cx="0" cy="0" r="3.5" fill="#f0b48a" stroke="#1b1612" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="1.2" fill="#a4502f"/>
  </g>
</svg>
