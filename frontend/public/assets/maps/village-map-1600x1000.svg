<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-label="龙潭村插画地图">
  <defs>
    <linearGradient id="vm-mtn-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9eb1a9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#cdd5ce" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="vm-mtn-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c9886" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a6bea9" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="vm-mtn-near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d7d61" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#84a17a" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="vm-water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfdfe2"/>
      <stop offset="100%" stop-color="#9bb9c2"/>
    </linearGradient>
    <linearGradient id="vm-field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6e0b0"/>
      <stop offset="100%" stop-color="#b6c789"/>
    </linearGradient>
    <linearGradient id="vm-roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4838"/>
      <stop offset="100%" stop-color="#3a2a1c"/>
    </linearGradient>
    <linearGradient id="vm-roof-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a4502f"/>
      <stop offset="100%" stop-color="#6b2f17"/>
    </linearGradient>
    <linearGradient id="vm-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1e0b8"/>
      <stop offset="100%" stop-color="#d6b889"/>
    </linearGradient>
    <radialGradient id="vm-tree" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a5c08a"/>
      <stop offset="100%" stop-color="#4f7259"/>
    </radialGradient>
    <pattern id="vm-cobble" width="14" height="10" patternUnits="userSpaceOnUse">
      <rect width="14" height="10" fill="#d6c194"/>
      <path d="M0 5 Q 7 2 14 5 M 0 10 Q 7 12 14 10 M 7 0 Q 4 5 7 10" stroke="#a89572" stroke-width=".8" fill="none"/>
    </pattern>
    <filter id="vm-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.15  0 0 0 0 0.10  0 0 0 0 0.05  0 0 0 .07 0"/>
    </filter>

    <!-- 传统屋 symbol -->
    <symbol id="vm-house" viewBox="0 0 100 80">
      <path d="M 18 40 L 50 24 L 82 40 L 82 70 L 18 70 Z" fill="url(#vm-wall)" stroke="#1b1612" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M 8 42 Q 15 22 50 14 Q 85 22 92 42 Q 50 36 8 42 Z" fill="url(#vm-roof)" stroke="#1b1612" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 14 40 Q 50 28 86 40" stroke="#1b1612" stroke-width="1.5" fill="none"/>
      <path d="M 22 32 L 24 40 M 32 28 L 34 38 M 42 24 L 44 36 M 58 24 L 56 36 M 68 28 L 66 38 M 78 32 L 76 40" stroke="#1b1612" stroke-width=".8" fill="none" opacity=".5"/>
      <rect x="44" y="52" width="12" height="18" fill="#5a3924" stroke="#1b1612" stroke-width="1.5"/>
      <line x1="50" y1="52" x2="50" y2="70" stroke="#1b1612" stroke-width="1"/>
      <rect x="26" y="50" width="10" height="8" fill="#3d5560" stroke="#1b1612" stroke-width="1.2"/>
      <rect x="64" y="50" width="10" height="8" fill="#3d5560" stroke="#1b1612" stroke-width="1.2"/>
    </symbol>

    <symbol id="vm-house-warm" viewBox="0 0 100 80">
      <path d="M 18 40 L 50 24 L 82 40 L 82 70 L 18 70 Z" fill="url(#vm-wall)" stroke="#1b1612" stroke-width="1.8"/>
      <path d="M 8 42 Q 15 22 50 14 Q 85 22 92 42 Q 50 36 8 42 Z" fill="url(#vm-roof-warm)" stroke="#1b1612" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 14 40 Q 50 28 86 40" stroke="#1b1612" stroke-width="1.5" fill="none"/>
      <rect x="44" y="52" width="12" height="18" fill="#5a3924" stroke="#1b1612" stroke-width="1.5"/>
      <rect x="26" y="50" width="10" height="8" fill="#3d5560" stroke="#1b1612" stroke-width="1.2"/>
      <rect x="64" y="50" width="10" height="8" fill="#3d5560" stroke="#1b1612" stroke-width="1.2"/>
    </symbol>

    <symbol id="vm-tree-sym" viewBox="0 0 60 80">
      <ellipse cx="30" cy="62" rx="14" ry="5" fill="#1b1612" opacity=".2"/>
      <rect x="27" y="42" width="6" height="20" fill="#6b4c30" stroke="#1b1612" stroke-width="1.2"/>
      <circle cx="30" cy="35" r="22" fill="url(#vm-tree)" stroke="#1b1612" stroke-width="1.8"/>
      <path d="M 18 28 Q 30 22 42 28 M 22 40 Q 30 36 38 40" stroke="#1b1612" stroke-width="1" fill="none" opacity=".4"/>
    </symbol>

    <symbol id="vm-bamboo" viewBox="0 0 30 80">
      <path d="M 8 78 L 8 8" stroke="#4f7259" stroke-width="2.5"/>
      <path d="M 18 78 L 18 14" stroke="#4f7259" stroke-width="2"/>
      <path d="M 14 75 L 14 22" stroke="#4f7259" stroke-width="2.2"/>
      <!-- 节 y=20 -->
      <ellipse cx="8" cy="20" rx="3" ry="1.5" fill="#3a4f3e"/>
      <ellipse cx="14" cy="26" rx="3" ry="1.5" fill="#3a4f3e"/>
      <ellipse cx="18" cy="22" rx="3" ry="1.5" fill="#3a4f3e"/>
      <!-- 节 y=36 -->
      <ellipse cx="8" cy="36" rx="3" ry="1.5" fill="#3a4f3e"/>
      <ellipse cx="14" cy="42" rx="3" ry="1.5" fill="#3a4f3e"/>
      <ellipse cx="18" cy="38" rx="3" ry="1.5" fill="#3a4f3e"/>
      <!-- 节 y=52 -->
      <ellipse cx="8" cy="52" rx="3" ry="1.5" fill="#3a4f3e"/>
      <ellipse cx="14" cy="58" rx="3" ry="1.5" fill="#3a4f3e"/>
      <ellipse cx="18" cy="54" rx="3" ry="1.5" fill="#3a4f3e"/>
      <path d="M 8 18 Q 0 14 -2 8 M 8 18 Q 16 14 22 8" stroke="#4f7259" stroke-width="1.2" fill="none"/>
      <path d="M 14 24 Q 6 20 4 14 M 14 24 Q 22 18 26 12" stroke="#4f7259" stroke-width="1.2" fill="none"/>
      <path d="M 18 30 Q 26 26 28 20" stroke="#4f7259" stroke-width="1.2" fill="none"/>
    </symbol>

    <symbol id="vm-bridge" viewBox="0 0 200 80">
      <path d="M 20 50 Q 100 30 180 50 L 180 60 Q 100 42 20 60 Z" fill="#9b7651" stroke="#1b1612" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 20 45 Q 100 22 180 45 L 180 30 Q 100 8 20 30 Z" fill="url(#vm-roof)" stroke="#1b1612" stroke-width="2" stroke-linejoin="round"/>
      <line x1="40" y1="46" x2="40" y2="32" stroke="#1b1612" stroke-width="1.5"/>
      <line x1="70" y1="46" x2="70" y2="32" stroke="#1b1612" stroke-width="1.5"/>
      <line x1="100" y1="46" x2="100" y2="32" stroke="#1b1612" stroke-width="1.5"/>
      <line x1="130" y1="46" x2="130" y2="32" stroke="#1b1612" stroke-width="1.5"/>
      <line x1="160" y1="46" x2="160" y2="32" stroke="#1b1612" stroke-width="1.5"/>
      <path d="M 60 60 Q 80 70 100 60 M 110 60 Q 130 70 150 60" stroke="#1b1612" stroke-width="1.5" fill="none"/>
    </symbol>
  </defs>

  <!-- 底色 -->
  <rect width="1600" height="1000" fill="#f5ecd7"/>
  <rect width="1600" height="1000" fill="#f5ecd7" filter="url(#vm-noise)" opacity="0.6"/>

  <!-- 远山 -->
  <path d="M 0 280 Q 200 200 380 240 Q 540 260 720 200 Q 900 160 1080 220 Q 1280 250 1480 200 Q 1580 180 1600 220 L 1600 320 L 0 320 Z" fill="url(#vm-mtn-far)"/>

  <!-- 中山 -->
  <path d="M 0 360 Q 160 280 320 330 Q 480 360 640 290 Q 820 240 1000 320 Q 1180 380 1360 320 Q 1500 290 1600 340 L 1600 420 L 0 420 Z" fill="url(#vm-mtn-mid)"/>
  <path d="M 0 360 Q 160 280 320 330 Q 480 360 640 290 Q 820 240 1000 320 Q 1180 380 1360 320 Q 1500 290 1600 340" stroke="#3a2f25" stroke-width="1.6" fill="none" opacity=".35"/>

  <!-- 近山 -->
  <path d="M 0 420 Q 80 320 180 380 Q 280 440 320 420 Q 360 400 380 460 L 380 1000 L 0 1000 Z" fill="url(#vm-mtn-near)"/>
  <path d="M 1600 420 Q 1520 340 1420 400 Q 1320 450 1280 430 Q 1240 415 1220 470 L 1220 1000 L 1600 1000 Z" fill="url(#vm-mtn-near)"/>
  <path d="M 0 420 Q 80 320 180 380 Q 280 440 320 420 Q 360 400 380 460" stroke="#1b1612" stroke-width="1.6" fill="none" opacity=".5"/>
  <path d="M 1600 420 Q 1520 340 1420 400 Q 1320 450 1280 430 Q 1240 415 1220 470" stroke="#1b1612" stroke-width="1.6" fill="none" opacity=".5"/>

  <!-- 田 -->
  <g opacity="0.85">
    <path d="M 380 500 L 600 460 L 680 500 L 540 540 Z" fill="url(#vm-field)" stroke="#6b4c30" stroke-width="1.2" stroke-dasharray="4 3"/>
    <path d="M 540 540 L 680 500 L 760 540 L 620 580 Z" fill="url(#vm-field)" stroke="#6b4c30" stroke-width="1.2" stroke-dasharray="4 3"/>
    <path d="M 380 500 L 540 540 L 460 580 L 320 540 Z" fill="url(#vm-field)" opacity="0.85" stroke="#6b4c30" stroke-width="1.2" stroke-dasharray="4 3"/>
    <path d="M 1000 460 L 1180 440 L 1280 480 L 1100 510 Z" fill="url(#vm-field)" stroke="#6b4c30" stroke-width="1.2" stroke-dasharray="4 3"/>
    <path d="M 1100 510 L 1280 480 L 1380 520 L 1200 560 Z" fill="url(#vm-field)" stroke="#6b4c30" stroke-width="1.2" stroke-dasharray="4 3"/>
    <!-- 田里作物点 row1 (24个) -->
    <circle cx="420" cy="500" r="1.5" fill="#4f7259"/><circle cx="450" cy="500" r="1.5" fill="#4f7259"/><circle cx="480" cy="500" r="1.5" fill="#4f7259"/>
    <circle cx="510" cy="500" r="1.5" fill="#4f7259"/><circle cx="540" cy="500" r="1.5" fill="#4f7259"/><circle cx="570" cy="500" r="1.5" fill="#4f7259"/>
    <circle cx="600" cy="500" r="1.5" fill="#4f7259"/><circle cx="630" cy="500" r="1.5" fill="#4f7259"/>
    <circle cx="435" cy="525" r="1.5" fill="#4f7259"/><circle cx="465" cy="525" r="1.5" fill="#4f7259"/><circle cx="495" cy="525" r="1.5" fill="#4f7259"/>
    <circle cx="525" cy="525" r="1.5" fill="#4f7259"/><circle cx="555" cy="525" r="1.5" fill="#4f7259"/><circle cx="585" cy="525" r="1.5" fill="#4f7259"/>
    <circle cx="615" cy="525" r="1.5" fill="#4f7259"/><circle cx="645" cy="525" r="1.5" fill="#4f7259"/>
    <circle cx="450" cy="550" r="1.5" fill="#4f7259"/><circle cx="480" cy="550" r="1.5" fill="#4f7259"/><circle cx="510" cy="550" r="1.5" fill="#4f7259"/>
    <circle cx="540" cy="550" r="1.5" fill="#4f7259"/><circle cx="570" cy="550" r="1.5" fill="#4f7259"/><circle cx="600" cy="550" r="1.5" fill="#4f7259"/>
    <circle cx="630" cy="550" r="1.5" fill="#4f7259"/><circle cx="660" cy="550" r="1.5" fill="#4f7259"/>
    <!-- 田里作物点 row2 (24个) -->
    <circle cx="1030" cy="470" r="1.5" fill="#4f7259"/><circle cx="1060" cy="470" r="1.5" fill="#4f7259"/><circle cx="1090" cy="470" r="1.5" fill="#4f7259"/>
    <circle cx="1120" cy="470" r="1.5" fill="#4f7259"/><circle cx="1150" cy="470" r="1.5" fill="#4f7259"/><circle cx="1180" cy="470" r="1.5" fill="#4f7259"/>
    <circle cx="1210" cy="470" r="1.5" fill="#4f7259"/><circle cx="1240" cy="470" r="1.5" fill="#4f7259"/>
    <circle cx="1042" cy="495" r="1.5" fill="#4f7259"/><circle cx="1072" cy="495" r="1.5" fill="#4f7259"/><circle cx="1102" cy="495" r="1.5" fill="#4f7259"/>
    <circle cx="1132" cy="495" r="1.5" fill="#4f7259"/><circle cx="1162" cy="495" r="1.5" fill="#4f7259"/><circle cx="1192" cy="495" r="1.5" fill="#4f7259"/>
    <circle cx="1222" cy="495" r="1.5" fill="#4f7259"/><circle cx="1252" cy="495" r="1.5" fill="#4f7259"/>
    <circle cx="1054" cy="520" r="1.5" fill="#4f7259"/><circle cx="1084" cy="520" r="1.5" fill="#4f7259"/><circle cx="1114" cy="520" r="1.5" fill="#4f7259"/>
    <circle cx="1144" cy="520" r="1.5" fill="#4f7259"/><circle cx="1174" cy="520" r="1.5" fill="#4f7259"/><circle cx="1204" cy="520" r="1.5" fill="#4f7259"/>
    <circle cx="1234" cy="520" r="1.5" fill="#4f7259"/><circle cx="1264" cy="520" r="1.5" fill="#4f7259"/>
  </g>

  <!-- 溪流 -->
  <path d="M -20 380 Q 200 460 360 520 Q 480 560 520 640 Q 540 720 700 760 Q 880 800 1020 760 Q 1180 720 1320 780 Q 1480 830 1640 820" fill="none" stroke="url(#vm-water)" stroke-width="56" stroke-linecap="round"/>
  <path d="M -20 380 Q 200 460 360 520 Q 480 560 520 640 Q 540 720 700 760 Q 880 800 1020 760 Q 1180 720 1320 780 Q 1480 830 1640 820" fill="none" stroke="#7ea0aa" stroke-width="1.2" opacity=".7"/>
  <path d="M 240 470 Q 270 475 300 470 M 460 580 Q 490 585 520 580 M 780 770 Q 810 776 840 770 M 1100 750 Q 1130 756 1160 750 M 1380 800 Q 1410 806 1440 800" stroke="#5d8590" stroke-width="1" fill="none" opacity=".6"/>

  <!-- 廊桥 -->
  <g transform="translate(620 670) rotate(8)">
    <use href="#vm-bridge" width="200" height="80"/>
  </g>

  <!-- 道路 -->
  <path d="M 320 920 Q 480 800 580 680 Q 660 600 760 580 Q 880 560 1000 580 Q 1140 600 1240 540 Q 1340 480 1420 440" stroke="url(#vm-cobble)" stroke-width="22" fill="none" stroke-linecap="round" opacity=".95"/>
  <path d="M 320 920 Q 480 800 580 680 Q 660 600 760 580 Q 880 560 1000 580 Q 1140 600 1240 540 Q 1340 480 1420 440" stroke="#1b1612" stroke-width="1.2" fill="none" opacity=".4" stroke-dasharray="3 5"/>

  <!-- 上排村落 -->
  <use href="#vm-house" x="420" y="440" width="90" height="72"/>
  <use href="#vm-house-warm" x="500" y="430" width="90" height="72"/>
  <use href="#vm-house" x="580" y="450" width="90" height="72"/>
  <use href="#vm-house" x="660" y="470" width="90" height="72"/>

  <!-- 河岸村落 -->
  <use href="#vm-house" x="780" y="620" width="100" height="80"/>
  <use href="#vm-house-warm" x="870" y="630" width="100" height="80"/>
  <use href="#vm-house" x="950" y="620" width="100" height="80"/>
  <use href="#vm-house" x="1030" y="640" width="100" height="80"/>
  <use href="#vm-house-warm" x="1110" y="660" width="100" height="80"/>

  <!-- 小梅桩（河南岸） -->
  <g transform="translate(540 720)">
    <path d="M -30 60 Q -30 30 0 20 L 120 20 Q 150 30 150 60 L 150 90 L -30 90 Z" fill="#e8d6a4" stroke="#1b1612" stroke-width="1.8" opacity=".7"/>
    <circle cx="0" cy="62" r="6" fill="#84a17a" stroke="#1b1612" stroke-width="1"/>
    <circle cx="14" cy="60" r="5" fill="#d97757" stroke="#1b1612" stroke-width="1"/>
    <circle cx="28" cy="64" r="6" fill="#84a17a" stroke="#1b1612" stroke-width="1"/>
    <circle cx="120" cy="60" r="6" fill="#84a17a" stroke="#1b1612" stroke-width="1"/>
    <circle cx="106" cy="62" r="5" fill="#f0b48a" stroke="#1b1612" stroke-width="1"/>
    <use href="#vm-house" x="30" y="-10" width="120" height="100"/>
  </g>

  <!-- 下排村落 -->
  <use href="#vm-house" x="780" y="850" width="100" height="80"/>
  <use href="#vm-house-warm" x="900" y="860" width="100" height="80"/>
  <use href="#vm-house" x="1010" y="840" width="100" height="80"/>

  <!-- 树（17棵，尺寸随 i%3 变化） -->
  <use href="#vm-tree-sym" x="430" y="540" width="48" height="64"/>
  <use href="#vm-tree-sym" x="380" y="600" width="58" height="76"/>
  <use href="#vm-tree-sym" x="320" y="660" width="68" height="88"/>
  <use href="#vm-tree-sym" x="690" y="540" width="48" height="64"/>
  <use href="#vm-tree-sym" x="620" y="590" width="58" height="76"/>
  <use href="#vm-tree-sym" x="760" y="570" width="68" height="88"/>
  <use href="#vm-tree-sym" x="870" y="760" width="48" height="64"/>
  <use href="#vm-tree-sym" x="960" y="770" width="58" height="76"/>
  <use href="#vm-tree-sym" x="1080" y="780" width="68" height="88"/>
  <use href="#vm-tree-sym" x="820" y="920" width="48" height="64"/>
  <use href="#vm-tree-sym" x="1140" y="900" width="58" height="76"/>
  <use href="#vm-tree-sym" x="1220" y="800" width="68" height="88"/>
  <use href="#vm-tree-sym" x="1260" y="700" width="48" height="64"/>
  <use href="#vm-tree-sym" x="1320" y="660" width="58" height="76"/>
  <use href="#vm-tree-sym" x="1360" y="600" width="68" height="88"/>
  <use href="#vm-tree-sym" x="1400" y="560" width="48" height="64"/>
  <use href="#vm-tree-sym" x="1240" y="460" width="58" height="76"/>

  <!-- 竹林（8组） -->
  <use href="#vm-bamboo" x="260" y="740" width="26" height="70"/>
  <use href="#vm-bamboo" x="290" y="760" width="26" height="70"/>
  <use href="#vm-bamboo" x="320" y="750" width="26" height="70"/>
  <use href="#vm-bamboo" x="350" y="770" width="26" height="70"/>
  <use href="#vm-bamboo" x="1340" y="720" width="26" height="70"/>
  <use href="#vm-bamboo" x="1370" y="740" width="26" height="70"/>
  <use href="#vm-bamboo" x="1400" y="730" width="26" height="70"/>
  <use href="#vm-bamboo" x="1430" y="750" width="26" height="70"/>

  <!-- 138 数字游民基地 -->
  <g transform="translate(1080 460)">
    <path d="M 0 30 L 0 80 L 100 80 L 100 30 L 50 0 Z" fill="#fbf6ea" stroke="#1b1612" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 0 30 L 50 0 L 100 30" fill="#6b97a3" stroke="#1b1612" stroke-width="1.8"/>
    <rect x="14" y="40" width="20" height="14" fill="#6b97a3" stroke="#1b1612" stroke-width="1.2"/>
    <rect x="40" y="40" width="20" height="14" fill="#6b97a3" stroke="#1b1612" stroke-width="1.2"/>
    <rect x="66" y="40" width="20" height="14" fill="#6b97a3" stroke="#1b1612" stroke-width="1.2"/>
    <rect x="42" y="58" width="16" height="22" fill="#5a3924" stroke="#1b1612" stroke-width="1.2"/>
    <rect x="30" y="-12" width="40" height="14" fill="#d97757" stroke="#1b1612" stroke-width="1.2" rx="2"/>
    <text x="50" y="-2" text-anchor="middle" font-size="10" fill="#fbf6ea" font-weight="bold" font-family="'JetBrains Mono', monospace">138</text>
  </g>

  <!-- 远景烟雾 -->
  <ellipse cx="500" cy="320" rx="200" ry="20" fill="#fbf6ea" opacity="0.45"/>
  <ellipse cx="1100" cy="340" rx="240" ry="22" fill="#fbf6ea" opacity="0.45"/>

  <!-- 村名印章 -->
  <g transform="translate(80 80)">
    <rect x="0" y="0" width="120" height="120" fill="#a4502f" stroke="#1b1612" stroke-width="2" rx="3" opacity=".92"/>
    <text x="60" y="48" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="34" fill="#fbf6ea" font-weight="700">龙潭</text>
    <text x="60" y="84" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="34" fill="#fbf6ea" font-weight="700">古村</text>
    <text x="60" y="108" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#fbf6ea" opacity=".7">福建·屏南</text>
  </g>

  <!-- 罗盘 -->
  <g transform="translate(1480 100)" opacity=".88">
    <circle r="46" fill="#fbf6ea" stroke="#1b1612" stroke-width="2"/>
    <path d="M 0 -38 L 8 0 L 0 38 L -8 0 Z" fill="#d97757" stroke="#1b1612" stroke-width="1.5"/>
    <text y="-32" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" fill="#1b1612" font-weight="700">北</text>
    <text y="44" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" fill="#1b1612" font-weight="700">南</text>
    <text x="-38" y="4" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" fill="#1b1612" font-weight="700">西</text>
    <text x="38" y="4" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" fill="#1b1612" font-weight="700">东</text>
    <circle r="46" fill="none" stroke="#1b1612" stroke-width="0.8" stroke-dasharray="2 3"/>
  </g>
</svg>
