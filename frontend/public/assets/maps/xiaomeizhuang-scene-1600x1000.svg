  <line x1="695" y1="925" x2="715" y2="910" stroke="#1b1612" stroke-width="1.2" opacity=".4"/>
  <line x1="770" y1="900" x2="790" y2="885" stroke="#1b1612" stroke-width="1.2" opacity=".4"/>
  <line x1="845" y1="875" x2="865" y2="860" stroke="#1b1612" stroke-width="1.2" opacity=".4"/>
  <line x1="920" y1="850" x2="940" y2="835" stroke="#1b1612" stroke-width="1.2" opacity=".4"/>
