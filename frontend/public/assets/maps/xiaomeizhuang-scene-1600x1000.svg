  <rect width="1600" height="500" fill="url(#xz-sky)"/>

  <!-- 远山 -->
  <path d="M 0 280 Q 200 200 380 240 Q 540 260 720 200 Q 900 160 1080 220 Q 1280 250 1480 200 Q 1580 180 1600 220 L 1600 360 L 0 360 Z" fill="url(#xz-mtn)"/>
  <path d="M 0 280 Q 200 200 380 240 Q 540 260 720 200 Q 900 160 1080 220 Q 1280 250 1480 200 Q 1580 180 1600 220" stroke="#1b1612" stroke-width="1.5" fill="none" opacity=".4"/>

  <!-- 院墙 -->
  <path d="M 0 480 L 1600 480 L 1600 510 L 0 510 Z" fill="#c9a784" stroke="#1b1612" stroke-width="1.8"/>
  <path d="M 0 470 L 1600 470 L 1600 482 L 0 482 Z" fill="#5a4838" stroke="#1b1612" stroke-width="1.5"/>

  <!-- 地面 -->
  <rect y="510" width="1600" height="490" fill="url(#xz-ground)"/>
  <rect y="510" width="1600" height="490" fill="url(#xz-ground)" filter="url(#xz-noise)" opacity="0.5"/>

  <!-- 青石路 -->
