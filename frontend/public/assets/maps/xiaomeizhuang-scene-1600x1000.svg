    <path d="M 20 83.7 L 25 92.3" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 50 74.8 L 55 82.4" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 80 70.3 L 85 77.3" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 110 71.2 L 115 78.4" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 140 77.3 L 145 85.2" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 170 85.4 L 175 94.3" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 200 98.9 L 205 109.4" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 230 109.7 L 235 121.5" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 260 117.3 L 265 130" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
    <path d="M 290 120 L 295 133" stroke="#1b1612" stroke-width=".7" opacity=".4"/>
