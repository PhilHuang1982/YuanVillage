    <rect x="150" y="170" width="60" height="110" fill="#5a3924" stroke="#1b1612" stroke-width="2.5"/>
    <line x1="180" y1="170" x2="180" y2="280" stroke="#1b1612" stroke-width="2"/>
    <circle cx="170" cy="225" r="2" fill="#d97757"/>
    <circle cx="190" cy="225" r="2" fill="#d97757"/>
    <!-- 左窗 -->
    <rect x="50" y="170" width="60" height="60" fill="#3d5560" stroke="#1b1612" stroke-width="2"/>
    <line x1="80" y1="170" x2="80" y2="230" stroke="#1b1612" stroke-width="1.2"/>
    <line x1="50" y1="200" x2="110" y2="200" stroke="#1b1612" stroke-width="1.2"/>
