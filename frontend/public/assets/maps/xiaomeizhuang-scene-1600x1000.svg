    <path d="M 292 57 L 308 73 M 308 57 L 292 73" stroke="#1b1612" stroke-width="1" opacity=".4"/>
    <ellipse cx="296" cy="81" rx="4" ry="3" fill="#4f7259" stroke="#1b1612" stroke-width="1" transform="rotate(-20 296 81)"/>
