    <text x="-20" y="218" font-size="10" fill="#f5ecd7" font-family="serif" text-anchor="middle" font-style="italic">My Home</text>
    <text x="-20" y="232" font-size="9" fill="#f5ecd7" font-family="serif" text-anchor="middle" font-style="italic">My Life Style</text>
