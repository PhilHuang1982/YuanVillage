    <line x1="80" y1="130" x2="80" y2="125" stroke="#1b1612" stroke-width="1"/>
    <line x1="80" y1="148" x2="80" y2="156" stroke="#1b1612" stroke-width="1"/>
    <circle cx="280" cy="140" r="8" fill="#d97757" stroke="#1b1612" stroke-width="1.5"/>
    <line x1="280" y1="130" x2="280" y2="125" stroke="#1b1612" stroke-width="1"/>
    <line x1="280" y1="148" x2="280" y2="156" stroke="#1b1612" stroke-width="1"/>
