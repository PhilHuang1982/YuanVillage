    <circle cx="260" cy="50" r="4" fill="#1b1612" opacity=".4"/>
    <path d="M 252 42 L 268 58 M 268 42 L 252 58" stroke="#1b1612" stroke-width="1" opacity=".4"/>
    <ellipse cx="256" cy="66" rx="4" ry="3" fill="#4f7259" stroke="#1b1612" stroke-width="1" transform="rotate(-20 256 66)"/>
