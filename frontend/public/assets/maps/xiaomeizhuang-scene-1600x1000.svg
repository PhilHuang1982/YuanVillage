<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-label="小梅桩庭院">
  <defs>
    <linearGradient id="xz-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ecd7"/>
      <stop offset="50%" stop-color="#ead9b6"/>
      <stop offset="100%" stop-color="#d6c194"/>
    </linearGradient>
    <linearGradient id="xz-mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c9886" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a6bea9" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="xz-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dec8a0"/>
      <stop offset="100%" stop-color="#b89762"/>
    </linearGradient>
    <linearGradient id="xz-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7edd6"/>
      <stop offset="100%" stop-color="#d6b889"/>
    </linearGradient>
    <linearGradient id="xz-roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4838"/>
      <stop offset="100%" stop-color="#2a1f15"/>
    </linearGradient>
    <radialGradient id="xz-flower-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e89a7a"/>
      <stop offset="100%" stop-color="#a4502f"/>
    </radialGradient>
    <radialGradient id="xz-flower-y" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7d678"/>
      <stop offset="100%" stop-color="#c89844"/>
    </radialGradient>
    <filter id="xz-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.15  0 0 0 0 0.10  0 0 0 0 0.05  0 0 0 .06 0"/>
    </filter>
  </defs>

