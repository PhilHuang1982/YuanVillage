    <ellipse cx="60" cy="50" rx="60" ry="14" fill="#a4502f" stroke="#1b1612" stroke-width="2"/>
    <rect x="55" y="50" width="10" height="40" fill="#6b4c30" stroke="#1b1612" stroke-width="1.5"/>
    <ellipse cx="40" cy="40" rx="14" ry="8" fill="#3a2812" stroke="#1b1612" stroke-width="1.5"/>
