<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>龙潭村奇遇 · 元家乡 2050</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="src/tokens.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--paper-100);
      color: var(--ink-900);
      font-family: var(--font-sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { width: 100%; height: 100%; }

    /* loader */
    .boot {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--paper-100);
      gap: 16px;
      z-index: 999;
      font-family: var(--font-serif);
    }
    .boot-seal {
      width: 64px; height: 64px;
      background: #a4502f;
      color: #fbf6ea;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 800;
      border: 2px solid #1b1612;
      box-shadow: 0 3px 0 #1b1612;
      animation: boot-pulse 1.6s ease-in-out infinite;
    }
    .boot-label { font-size: 14px; color: #6a5740; letter-spacing: 0.2em; }
    @keyframes boot-pulse {
      0%, 100% { transform: scale(1) }
      50%      { transform: scale(1.04) }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot">
      <div class="boot-seal">元</div>
      <div class="boot-label">正在打开村门…</div>
    </div>
  </div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- 剧本（纯 JS，不需要 babel） -->
  <script src="src/dialog-scripts.js"></script>
  <script src="src/persona-prompts.js"></script>

  <!-- Tweaks shell -->
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>

  <!-- 组件（注册到 window） -->
  <script type="text/babel" src="src/characters.jsx"></script>
  <script type="text/babel" src="src/rpg-dialog.jsx"></script>
  <script type="text/babel" src="src/village-map.jsx"></script>
  <script type="text/babel" src="src/xiaomeizhuang-scene.jsx"></script>
  <script type="text/babel" src="src/scene-ui.jsx"></script>
  <script type="text/babel" src="src/side-panels.jsx"></script>

  <!-- 主 App（必须最后加载） -->
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
